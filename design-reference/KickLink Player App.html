<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>KickLink — Player App Prototype</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #E4DDF3; font-family: -apple-system, "SF Pro Text", system-ui, sans-serif; }
  #root { height: 100%; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes klSpin { to { transform: rotate(360deg); } }
  @keyframes klFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes klSlideUp { from { transform: translateY(16px); } to { transform: translateY(0); } }
  @keyframes klDrop { from { transform: translateY(-12px); } to { transform: translateY(0); } }
  @keyframes klPop { 0% { transform: scale(0.7); } 100% { transform: scale(1); } }
  @keyframes klPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.06); opacity: 0.75; } }
  @keyframes klBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes klPushIn { from { transform: translateX(22px); } to { transform: translateX(0); } }
  @keyframes klPopIn { from { transform: translateX(-18px); } to { transform: translateX(0); } }
  @keyframes klRootIn { from { transform: scale(0.994); } to { transform: scale(1); } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="kl-data.jsx"></script>
  <script type="text/babel" src="kl-kit.jsx"></script>
  <script type="text/babel" src="kl-screens-a.jsx"></script>
  <script type="text/babel" src="kl-screens-b.jsx"></script>
  <script type="text/babel" src="kl-screens-c.jsx"></script>
  <script type="text/babel" src="kl-app.jsx"></script>
</body>
</html>
