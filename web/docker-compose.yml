# One-command hosting: Postgres + the KickLink web app.
#
#   docker compose up --build        # build & start
#   docker compose run --rm app npm run db:seed   # (optional) demo data
#
# Then open http://localhost:3000
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kicklink
      POSTGRES_PASSWORD: kicklink
      POSTGRES_DB: kicklink
    volumes:
      - kicklink-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kicklink"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://kicklink:kicklink@db:5432/kicklink?schema=public"
      # CHANGE THIS in production: `openssl rand -base64 32`
      AUTH_SECRET: "change-me-to-a-long-random-string"
      AUTH_TRUST_HOST: "true"
      # Optional — set to enable real Stripe payments:
      STRIPE_SECRET_KEY: ""
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
    ports:
      - "3000:3000"
    # Apply migrations on boot, then start the server.
    command: sh -c "node_modules/.bin/prisma migrate deploy && node server.js"

volumes:
  kicklink-db:
