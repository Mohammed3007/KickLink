<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KickLink — Organizer Dashboard</title>
<style>
  :root{
    --violet:#6E3BD8; --violet-press:#5A2BBF; --violet-tint:#F1ECFC; --violet-tint2:#E7DDFA;
    --ink:#15131C; --ink2:#5C5A66; --ink3:#8E8C99;
    --bg:#F6F5FA; --card:#FFFFFF; --fill:#EFEFF4; --line:rgba(60,60,67,.13); --line2:rgba(60,60,67,.07);
    --green:#12915A; --green-bg:#E4F4EC; --amber:#B7790E; --amber-bg:#FBF0DC;
    --blue:#2666D6; --blue-bg:#E7F0FD; --orange:#D85A18; --orange-bg:#FCEADD;
    --red:#CF3A40; --red-bg:#FBE9EA; --gray:#6B6975; --gray-bg:#ECECF0;
    --font:-apple-system,"SF Pro Text",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:9px;height:9px;}::-webkit-scrollbar-thumb{background:#d4d2dc;border-radius:9px;}

  .app{display:grid;grid-template-columns:248px 1fr;height:100vh;}
  /* sidebar */
  .side{background:#1B1726;color:#fff;display:flex;flex-direction:column;overflow:hidden;}
  .brand{display:flex;align-items:center;gap:10px;padding:18px 18px 14px;}
  .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(160deg,#8A57E6,var(--violet) 60%,#5A2BBF);position:relative;flex-shrink:0;box-shadow:inset 0 1px 1px rgba(255,255,255,.3);}
  .logo svg{position:absolute;inset:0;}
  .brand-name{font-weight:800;font-size:18px;letter-spacing:-.5px;}
  .brand-name span{color:#B79AF0;}
  .orgsw{margin:0 12px 8px;padding:9px 11px;background:rgba(255,255,255,.06);border-radius:11px;display:flex;align-items:center;gap:9px;cursor:pointer;border:1px solid rgba(255,255,255,.08);}
  .orgsw:hover{background:rgba(255,255,255,.1);}
  .orgsw .av{width:28px;height:28px;border-radius:7px;background:var(--violet);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
  .orgsw .nm{font-size:13px;font-weight:600;line-height:1.2;flex:1;min-width:0;}
  .orgsw .nm small{display:block;font-weight:500;color:#9890ab;font-size:11px;}
  .nav{flex:1;overflow-y:auto;padding:6px 12px 16px;}
  .nav-group{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#6f6885;padding:14px 12px 6px;}
  .nav-item{display:flex;align-items:center;gap:11px;padding:8px 12px;border-radius:9px;cursor:pointer;color:#c5c0d4;font-size:13.5px;font-weight:500;position:relative;white-space:nowrap;}
  .nav-item span{flex:1;overflow:hidden;text-overflow:ellipsis;}
  .nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
  .nav-item.on{background:var(--violet);color:#fff;font-weight:600;}
  .ic{width:18px;height:18px;flex-shrink:0;}
  .nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
  .nav-item.on .badge{background:rgba(255,255,255,.25);}
  .side-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px;}
  .side-foot .av{width:30px;height:30px;border-radius:50%;background:#3E7C45;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;}
  .side-foot .nm{font-size:12.5px;font-weight:600;line-height:1.2;}
  .side-foot .nm small{display:block;color:#9890ab;font-weight:500;font-size:11px;}

  /* main */
  .main{overflow-y:auto;display:flex;flex-direction:column;}
  .topbar{position:sticky;top:0;z-index:10;background:rgba(246,245,250,.85);backdrop-filter:saturate(180%) blur(16px);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:16px;}
  .topbar h1{font-size:21px;font-weight:800;letter-spacing:-.5px;flex:1;}
  .topbar .sub{color:var(--ink3);font-size:13px;font-weight:500;}
  .search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 12px;width:240px;color:var(--ink3);font-size:13px;}
  .search input{border:none;outline:none;font-family:var(--font);font-size:13px;flex:1;background:transparent;color:var(--ink);}
  .btn{border:none;border-radius:10px;padding:8px 15px;font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .btn-pri{background:var(--violet);color:#fff;}.btn-pri:hover{background:var(--violet-press);}
  .btn-neu{background:var(--fill);color:var(--ink);}.btn-neu:hover{background:#e4e3ea;}
  .btn-out{background:var(--card);color:var(--ink);border:1px solid var(--line);}.btn-out:hover{background:var(--fill);}
  .content{padding:24px 28px 60px;}

  /* cards / grid */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi{background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:15px 16px;}
  .kpi .lab{font-size:12px;color:var(--ink3);font-weight:600;display:flex;align-items:center;gap:6px;}
  .kpi .lab .ic{width:15px;height:15px;}
  .banner .ic{width:18px;height:18px;}
  .kpi .val{font-size:27px;font-weight:800;letter-spacing:-.7px;margin-top:6px;}
  .kpi .delta{font-size:12px;font-weight:600;margin-top:3px;}
  .kpi .delta.up{color:var(--green);} .kpi .delta.down{color:var(--red);} .kpi .delta.neu{color:var(--ink3);}
  .kpi.alert{border-color:var(--amber);} .kpi.alert .val{color:var(--amber);}

  .row2{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start;}
  .panel{background:var(--card);border:1px solid var(--line2);border-radius:16px;overflow:hidden;}
  .panel-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);}
  .panel-h h2{font-size:15px;font-weight:700;letter-spacing:-.3px;}
  .panel-h .link{color:var(--violet);font-size:13px;font-weight:600;cursor:pointer;}

  /* table */
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ink3);padding:11px 16px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;}
  th .ar{opacity:.4;font-size:9px;}
  td{padding:12px 16px;border-bottom:1px solid var(--line2);font-size:13.5px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--violet-tint);}
  .pl{display:flex;align-items:center;gap:10px;}
  .av-sm{width:30px;height:30px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11.5px;flex-shrink:0;}
  .pl .meta{line-height:1.25;}.pl .meta b{font-weight:600;font-size:13.5px;}.pl .meta small{color:var(--ink3);font-size:11.5px;}
  .badge2{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap;}
  .badge2 .dot{width:6px;height:6px;border-radius:6px;}
  .b-green{background:var(--green-bg);color:var(--green);}.b-green .dot{background:var(--green);}
  .b-amber{background:var(--amber-bg);color:var(--amber);}.b-amber .dot{background:var(--amber);}
  .b-blue{background:var(--blue-bg);color:var(--blue);}.b-blue .dot{background:var(--blue);}
  .b-orange{background:var(--orange-bg);color:var(--orange);}.b-orange .dot{background:var(--orange);}
  .b-red{background:var(--red-bg);color:var(--red);}.b-red .dot{background:var(--red);}
  .b-gray{background:var(--gray-bg);color:var(--gray);}.b-gray .dot{background:var(--gray);}
  .stack{display:flex;gap:6px;flex-wrap:wrap;}
  .tact{color:var(--violet);font-weight:600;font-size:13px;cursor:pointer;}
  .rowact{display:flex;gap:6px;justify-content:flex-end;}

  .filters{display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .chip{padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink2);}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .chip .n{opacity:.6;margin-left:4px;}

  /* list items in side panels */
  .li{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line2);}
  .li:last-child{border-bottom:none;}
  .li .ic-box{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .li .t{flex:1;line-height:1.3;}.li .t b{font-size:13.5px;font-weight:600;}.li .t small{display:block;color:var(--ink3);font-size:12px;}
  .li .time{color:var(--ink3);font-size:11.5px;}

  .pager{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--line);font-size:13px;color:var(--ink3);}
  .pager .pg{display:flex;gap:4px;}
  .pager .pg button{border:1px solid var(--line);background:var(--card);border-radius:8px;min-width:30px;height:30px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;color:var(--ink2);}
  .pager .pg button.on{background:var(--violet);color:#fff;border-color:var(--violet);}

  .view{display:none;} .view.on{display:block;}
  .sect-title{font-size:13px;font-weight:700;color:var(--ink2);margin:0 0 10px 2px;}
  .empty{text-align:center;padding:50px 20px;color:var(--ink3);}
  .empty .e-ic{width:54px;height:54px;border-radius:15px;background:var(--violet-tint);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
  .perm{display:flex;gap:12px;align-items:flex-start;background:var(--amber-bg);border-radius:12px;padding:14px 16px;color:var(--amber);}

  .banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:11px;font-size:13px;font-weight:600;margin-bottom:18px;}
  .banner.warn{background:var(--amber-bg);color:var(--amber);}

  @media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr);}.row2{grid-template-columns:1fr;}}
  @media(max-width:860px){.app{grid-template-columns:1fr;}.side{position:fixed;left:0;top:0;bottom:0;width:248px;transform:translateX(-100%);transition:.2s;z-index:50;}.side.open{transform:none;}.menu-btn{display:inline-flex!important;}}
  .menu-btn{display:none;}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="side" id="side">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 32 32" width="32" height="32"><rect x="7" y="11" width="13" height="10" rx="5" fill="none" stroke="#fff" stroke-width="2.8"/><rect x="12" y="11" width="13" height="10" rx="5" fill="none" stroke="#fff" stroke-width="2.8"/></svg></div>
      <div class="brand-name">Kick<span>Link</span></div>
    </div>
    <div class="orgsw" title="Switch organization">
      <div class="av">WS</div>
      <div class="nm">Westside Sunday League<small>Organizer · WSL-4471</small></div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9890ab" stroke-width="2.5"><path d="M8 10l4 4 4-4"/></svg>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <div class="av">MA</div>
      <div class="nm">Marcus Adeyemi<small>Owner</small></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="btn btn-neu menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
      <h1 id="title">Overview</h1>
      <div class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search players, games…"></div>
      <button class="btn btn-pri" onclick="go('events')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>Create game</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="kl-dash-organizer.js"></script>
</body>
</html>
